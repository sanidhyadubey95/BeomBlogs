          @keyframes bblink{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(0.07)}}
          @keyframes btail{0%,100%{transform:rotate(-14deg)}50%{transform:rotate(14deg)}}
          @keyframes bpage{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-9deg)}}
          @keyframes bpencil{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,2px)}}
          @keyframes bsteam{0%{opacity:0;transform:translateY(0)}40%{opacity:.65}100%{opacity:0;transform:translateY(-18px)}}

          .bpencil{animation:bpencil 1.6s ease-in-out infinite;transform-origin:180px 234px}
          .bs1{animation:bsteam 2.1s ease-out infinite}
          .bs2{animation:bsteam 2.1s ease-out .72s infinite}
          .bs3{animation:bsteam 2.1s ease-out 1.4s infinite}
          .bsp1{animation:bsparkle 2.8s ease-in-out infinite}
          .bsp2{animation:bsparkle 3.4s ease-in-out .9s infinite}
          .bsp3{animation:bsparkle 2.5s ease-in-out 1.6s infinite}

              <line x1="184.7" y1="224" x2="184.7" y2="232" stroke="#c8a020" stroke-width=".6"/>

          <circle cx="162" cy="122" r="15" fill="#7a5535" stroke="#5a3a20" stroke-width="1.5"/>
          <circle cx="162" cy="122" r="8" fill="#b8906a"/>

          <circle cx="118" cy="152" r="14" fill="rgba(121,192,255,.07)" stroke="#111820" stroke-width="2.5"/>
          <circle cx="142" cy="152" r="14" fill="rgba(121,192,255,.07)" stroke="#111820" stroke-width="2.5"/>
          <line x1="132" y1="152" x2="128" y2="152" stroke="#111820" stroke-width="2.5"/>
          <path d="M104 150 Q101 145 97 145" fill="none" stroke="#111820" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M156 150 Q159 145 163 145" fill="none" stroke="#111820" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="113" cy="147" r="3.5" fill="rgba(255,255,255,.22)"/>

          <ellipse cx="130" cy="166" rx="7.5" ry="5.5" fill="#3a1e0c"/>

          <text class="bsp1" x="202" y="210" font-size="8" fill="#a78bfa" font-family="sans-serif">✦</text>
        </g>
