<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mandelbrot Set</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; font-family: 'DM Mono', monospace, monospace; color: #c8c8d0; display: flex; flex-direction: column; align-items: center; padding: 12px; }
  canvas { cursor: crosshair; border: 1px solid #2a2a3a; border-radius: 4px; max-width: 100%; }
  .controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; align-items: center; font-size: 12px; }
  button { background: #1a1a2e; color: #9090c0; border: 1px solid #3a3a5a; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 12px; font-family: inherit; }
  button:hover { background: #2a2a4e; color: #b0b0e0; }
  .info { font-size: 11px; opacity: 0.6; margin-top: 6px; text-align: center; }
  select { background: #1a1a2e; color: #9090c0; border: 1px solid #3a3a5a; border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 12px; }
</style>
</head>
<body>
<canvas id="c" width="560" height="380"></canvas>
<div class="controls">
  <button id="resetBtn">Reset</button>
  <label>Palette: <select id="palette">
    <option value="classic">Classic</option>
    <option value="fire">Fire</option>
    <option value="ocean">Ocean</option>
    <option value="gold">Gold</option>
  </select></label>
  <button id="moreIter">+ Detail</button>
  <span id="coordInfo" style="font-size:11px;opacity:0.5;">Click to zoom</span>
</div>
<p class="info">Click to zoom in · Right-click to zoom out</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width, H = canvas.height;

let state = { xMin: -2.5, xMax: 1.0, yMin: -1.2, yMax: 1.2, maxIter: 100 };
let rendering = false;
let currentPalette = 'classic';

const palettes = {
  classic: (t) => {
    const r = Math.floor(9 * (1 - t) * t * t * t * 255);
    const g = Math.floor(15 * (1 - t) * (1 - t) * t * t * 255);
    const b = Math.floor(8.5 * (1 - t) * (1 - t) * (1 - t) * t * 255);
    return [r, g, b];
  },
  fire: (t) => {
    return [Math.min(255, t * 3 * 255), Math.min(255, Math.max(0, t * 3 - 1) * 255), Math.min(255, Math.max(0, t * 3 - 2) * 255)];
  },
  ocean: (t) => {
    const b = Math.floor((0.5 + 0.5 * Math.sin(t * Math.PI * 3)) * 255);
    const g = Math.floor(t * 180);
    const r = Math.floor(t * 60);
    return [r, g, b];
  },
  gold: (t) => {
    const v = Math.floor(t * 255);
    return [v, Math.floor(v * 0.8), Math.floor(v * 0.2)];
  }
};

function mandelbrot(cr, ci, maxIter) {
  let zr = 0, zi = 0, n = 0;
  while (n < maxIter && zr * zr + zi * zi <= 4) {
    let tmp = zr * zr - zi * zi + cr;
    zi = 2 * zr * zi + ci;
    zr = tmp;
    n++;
  }
  if (n === maxIter) return -1;
  const log2 = Math.log(zr * zr + zi * zi) / 2;
  return n - Math.log(log2 / Math.log(2)) / Math.log(2);
}

function render() {
  if (rendering) return;
  rendering = true;
  const imgData = ctx.createImageData(W, H);
  const d = imgData.data;
  const { xMin, xMax, yMin, yMax, maxIter } = state;
  const pal = palettes[currentPalette];

  let row = 0;
  function renderChunk() {
    const end = Math.min(row + 8, H);
    for (let py = row; py < end; py++) {
      for (let px = 0; px < W; px++) {
        const cr = xMin + (px / W) * (xMax - xMin);
        const ci = yMin + (py / H) * (yMax - yMin);
        const m = mandelbrot(cr, ci, maxIter);
        const idx = (py * W + px) * 4;
        if (m < 0) {
          d[idx] = 10; d[idx+1] = 10; d[idx+2] = 20; d[idx+3] = 255;
        } else {
          const t = m / maxIter;
          const [r, g, b] = pal(t);
          d[idx] = r; d[idx+1] = g; d[idx+2] = b; d[idx+3] = 255;
        }
      }
    }
    ctx.putImageData(imgData, 0, 0);
    row = end;
    if (row < H) {
      requestAnimationFrame(renderChunk);
    } else {
      rendering = false;
    }
  }
  requestAnimationFrame(renderChunk);
}

function zoomTo(cx, cy, factor) {
  const { xMin, xMax, yMin, yMax } = state;
  const mx = xMin + (cx / W) * (xMax - xMin);
  const my = yMin + (cy / H) * (yMax - yMin);
  const dx = (xMax - xMin) * factor / 2;
  const dy = (yMax - yMin) * factor / 2;
  state.xMin = mx - dx; state.xMax = mx + dx;
  state.yMin = my - dy; state.yMax = my + dy;
  render();
}

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  zoomTo(e.clientX - r.left, e.clientY - r.top, 0.4);
});
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  zoomTo(e.clientX - r.left, e.clientY - r.top, 2.5);
});
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const px = e.clientX - r.left, py = e.clientY - r.top;
  const cr = state.xMin + (px / W) * (state.xMax - state.xMin);
  const ci = state.yMin + (py / H) * (state.yMax - state.yMin);
  document.getElementById('coordInfo').textContent = `c = ${cr.toFixed(4)} + ${ci.toFixed(4)}i`;
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state = { xMin: -2.5, xMax: 1.0, yMin: -1.2, yMax: 1.2, maxIter: 100 };
  render();
});
document.getElementById('moreIter').addEventListener('click', () => {
  state.maxIter = Math.min(state.maxIter * 2, 2000);
  render();
});
document.getElementById('palette').addEventListener('change', e => {
  currentPalette = e.target.value;
  render();
});

render();
</script>
</body>
</html>
